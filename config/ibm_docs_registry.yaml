# Public IBM Documentation crawl allowlist.
# Enabling a target permits robots-compliant crawling and staging-index writes.
# Exact product/version scopes prevent URLs from bleeding across products.

registry_version: "2"
sitemap_url: https://www.ibm.com/docs/en/sitemap.xml

products:
  - product_id: watsonx-orchestrate
    product_name: watsonx Orchestrate
    domain_id: watsonx_orchestrate
    docs_path_prefix: /docs/en/watsonx/watson-orchestrate/base
    aliases: [watsonx orchestrate, orchestrate adk, ai builder]
    document_type: developer_docs
    classification: public
    access_scope: [public, isa_technical]
    max_pages: 250
    versions:
      - version_id: latest
        product_version: current
        seed_url: https://www.ibm.com/docs/en/watsonx/watson-orchestrate/base?topic=getting-started
        sitemap_url: https://www.ibm.com/docs/en/SSAVQO/0/sitemap.xml
        crawl_enabled: true

